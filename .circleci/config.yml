version: 2.1
jobs:
  boundary-check:
    docker:
      - image: cimg/python:3.12
    steps:
      - checkout
      - run:
          name: "Verify firmware packaging boundary"
          command: |
            python3 tools/test-flasher-build-manifest.py
            python3 tools/test-firmware-update-boundary.py
workflows:
  firmware-boundary:
    jobs:
      - boundary-check
